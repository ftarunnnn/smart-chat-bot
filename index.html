<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Chatbot</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .chat-container{
            width:400px;
            background:white;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        .header{
            background:#007bff;
            color:white;
            padding:15px;
            text-align:center;
            font-size:20px;
        }

        #chat-box{
            height:400px;
            overflow-y:auto;
            padding:15px;
        }

        .message{
            margin:10px 0;
            padding:10px;
            border-radius:10px;
        }

        .user{
            background:#d1ecf1;
            text-align:right;
        }

        .bot{
            background:#e2e3e5;
        }

        .input-area{
            display:flex;
            border-top:1px solid #ccc;
        }

        #userInput{
            flex:1;
            padding:12px;
            border:none;
            outline:none;
        }

        button{
            padding:12px 20px;
            border:none;
            background:#007bff;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<div class="chat-container">

    <div class="header">
        Smart Chatbot
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

const chatBox = document.getElementById("chat-box");

window.onload = () => {

    let savedChat = localStorage.getItem("chat");

    if(savedChat){
        chatBox.innerHTML = savedChat;
    }else{
        addMessage("bot","Hello! I am SmartBot. Ask me anything.");
    }
};

function addMessage(sender,message){

    let div = document.createElement("div");

    div.classList.add("message");

    if(sender === "user"){
        div.classList.add("user");
    }else{
        div.classList.add("bot");
    }

    div.innerHTML = `<strong>${sender}:</strong> ${message}`;

    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;

    localStorage.setItem("chat",chatBox.innerHTML);
}

function sendMessage(){

    let input = document.getElementById("userInput");

    let text = input.value.trim();

    if(text === "") return;

    addMessage("user",text);

    input.value = "";

    setTimeout(()=>{
        botReply(text);
    },500);
}

function botReply(message){

    let msg = message.toLowerCase();

    let response = "";

    if(msg.includes("hello") || msg.includes("hi")){
        response = "Hello! How can I help you?";
    }

    else if(msg.includes("how are you")){
        response = "I am doing great!";
    }

    else if(msg.includes("your name")){
        response = "My name is SmartBot.";
    }

    else if(msg.includes("time")){
        response = new Date().toLocaleTimeString();
    }

    else if(msg.includes("date")){
        response = new Date().toLocaleDateString();
    }

    else if(msg.includes("html")){
        response = "HTML is used to create web pages.";
    }

    else if(msg.includes("css")){
        response = "CSS is used to style web pages.";
    }

    else if(msg.includes("javascript")){
        response = "JavaScript makes web pages interactive.";
    }

    else if(msg.startsWith("calc")){

        try{

            let expression = msg.replace("calc","");

            let result = eval(expression);

            response = "Answer: " + result;

        }catch{

            response = "Invalid calculation.";
        }
    }

    else if(msg.includes("bye")){
        response = "Goodbye! Have a nice day.";
    }

    else{
        response = "Sorry, I don't understand that.";
    }

    addMessage("bot",response);

    speak(response);
}

document
.getElementById("userInput")
.addEventListener("keypress",function(e){

    if(e.key === "Enter"){
        sendMessage();
    }
});

function speak(text){

    let speech = new SpeechSynthesisUtterance(text);

    speech.lang = "en-US";

    window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
